spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:bookdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}   # ← 로컬은 never, EB는 always로 환경변수 설정